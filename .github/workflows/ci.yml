name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  api:
    name: apps/api — lint, typecheck, import-lint, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.29"
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff
        run: uv run ruff check .

      - name: mypy (strict)
        run: uv run mypy

      - name: import-linter
        run: uv run lint-imports

      - name: pytest
        run: uv run pytest -q
