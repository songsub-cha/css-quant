# Prod stack (SoT A8 Phase 0, D1). Built images only — no hot-reload bind
# mounts. Separate file from docker-compose.dev.yml on purpose (SoT D1: "dev
# compose와 prod compose는 별도 파일").
#
# `worker` mirrors `api`'s env_file/depends_on wiring for the same reason as
# the dev file (SoT D1 flags a prior incident where worker was left out of
# compose entirely and the whole pipeline silently never ran — do not drop
# it here either). It diverges from `api` on entrypoint/command: `api` keeps
# the image's default entrypoint (migrate once, then serve — see
# apps/api/docker-entrypoint.prod.sh), while `worker` overrides
# `entrypoint: []` so it never runs the migration step and never inherits
# uvicorn as a fallback CMD, running arq directly instead.
# `alembic upgrade head` must run exactly once per deploy, from `api` only.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quantpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quantpilot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.prod
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/quantpilot
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.prod
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/quantpilot
      REDIS_URL: redis://redis:6379/0
    entrypoint: []
    command: ["arq", "src.workers.settings.WorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
