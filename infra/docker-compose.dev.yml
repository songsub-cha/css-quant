# Dev stack (SoT A8 Phase 0, D1 service-shape). Hot-reload via bind mount;
# separate from the prod compose file (SoT D1: "dev compose와 prod compose는
# 별도 파일").
#
# `worker` mirrors `api`'s depends_on/healthcheck wiring on purpose — SoT D1
# flags a prior incident where the worker was left out of compose and the
# whole pipeline silently never ran. Do not drop it.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quantpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quantpilot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/quantpilot
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api:/app
      - api_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/quantpilot
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../apps/api:/app
      - api_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["arq", "src.workers.settings.WorkerSettings"]

volumes:
  postgres_data:
  redis_data:
  api_venv:
